<!DOCTYPE html>
<html>
<head>
    <title>Test API Staff</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test API Staff - Vérification des données</h1>
    
    <div class="test">
        <h3>1. Test Login Staff</h3>
        <button onclick="testLogin()">Tester Login Staff</button>
        <div id="login-result"></div>
    </div>

    <div class="test">
        <h3>2. Test Clients API</h3>
        <button onclick="testClients()">Tester /clients</button>
        <div id="clients-result"></div>
    </div>

    <div class="test">
        <h3>3. Test Backlinks API</h3>
        <button onclick="testBacklinks()">Tester /backlinks</button>
        <div id="backlinks-result"></div>
    </div>

    <script>
        let authToken = null;

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'staff@agency.com',
                        password: 'Staff123!'
                    })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (response.ok && data.token) {
                    authToken = data.token;
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h4>✅ Login Success</h4>
                            <p>Token: ${data.token.substring(0, 50)}...</p>
                            <p>User: ${data.user.name} (${data.user.role})</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h4>❌ Login Failed</h4>
                            <p>Status: ${response.status}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Network Error</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testClients() {
            const resultDiv = document.getElementById('clients-result');
            if (!authToken) {
                resultDiv.innerHTML = '<div class="error">❌ Please login first</div>';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/clients', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json',
                    }
                });
                
                const data = await response.json();
                console.log('Clients response:', data);
                
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        <h4>${response.ok ? '✅' : '❌'} Clients API</h4>
                        <p>Status: ${response.status}</p>
                        <p>Count: ${Array.isArray(data) ? data.length : 'N/A'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Network Error</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testBacklinks() {
            const resultDiv = document.getElementById('backlinks-result');
            if (!authToken) {
                resultDiv.innerHTML = '<div class="error">❌ Please login first</div>';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/backlinks', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json',
                    }
                });
                
                const data = await response.json();
                console.log('Backlinks response:', data);
                
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        <h4>${response.ok ? '✅' : '❌'} Backlinks API</h4>
                        <p>Status: ${response.status}</p>
                        <p>Count: ${Array.isArray(data) ? data.length : 'N/A'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Network Error</h4>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
